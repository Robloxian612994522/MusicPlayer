<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Sync Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #1a1a1a;
            color: #ffffff;
            padding-top: 50px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        button.connected {
            background-color: #2ed573;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Roblox Audio Receiver</h1>
        <p>Status: <span id="statusText">Disconnected</span></p>
        <button id="startBtn">Click to Connect Audio</button>
        <br>
        <audio id="audioPlayer" controls></audio>
    </div>

    <!-- Import Firebase App and Realtime Database SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ⚠️ REPLACE THIS ENTIRE OBJECT WITH YOUR ACTUAL CONFIG FROM FIREBASE SETTINGS ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "test-312ea.firebaseapp.com",
            databaseURL: "https://test-312ea-default-rtdb.firebaseio.com",
            projectId: "test-312ea",
            storageBucket: "test-312ea.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const player = document.getElementById('audioPlayer');
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('statusText');
        let browserAllowedAudio = false;

        // Bypass browser autoplay restriction on click
        startBtn.addEventListener('click', () => {
            browserAllowedAudio = true;
            startBtn.innerText = "Connected 🟢";
            startBtn.classList.add('connected');
            statusText.innerText = "Listening for Studio commands...";
        });

        // Listen for updates from Roblox Studio via Firebase
        const audioRef = ref(db, 'audioState');
        onValue(audioRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            console.log("Database update received:", data);

            if (data.status === "play" && browserAllowedAudio) {
                player.src = data.songUrl;
                player.play().catch(err => {
                    console.log("Autoplay prevented. Make sure to click the green button first!");
                });
            } else if (data.status === "stop") {
                player.pause();
            }
        });
    </script>
</body>
</html>
